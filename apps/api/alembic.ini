[alembic]
script_location = alembic

# The real URL comes from env.py (reads Settings), but Alembic requires
# this key to exist.  The placeholder is never actually used.
sqlalchemy.url = postgresql+asyncpg://applybot:applybot@localhost:5432/applybot

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
